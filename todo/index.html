<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do Demo - DOM & Events</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #6366f1;
      --accent-2: #22d3ee;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1e293b, var(--bg));
      color: var(--text); max-width: 640px; margin: 3rem auto; padding: 0 1rem;
      min-height: 100vh;
    }
    h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
    p { color: var(--muted); }
    .card { background: var(--card); padding: 2rem; border-radius: 16px;
            margin: 1.5rem 0; box-shadow: 0 10px 30px rgba(0,0,0,0.35); }
    .row { display: flex; gap: 0.6rem; }
    input[type="text"] {
      flex: 1; padding: 0.8rem 1rem; font-size: 1rem; border-radius: 10px;
      border: 1px solid #334155; background: #0b1220; color: var(--text);
    }
    input[type="text"]:focus { outline: 2px solid var(--accent); }
    button {
      padding: 0.8rem 1.2rem; cursor: pointer; border: none; border-radius: 10px;
      color: #fff; font-weight: 600; background: var(--accent); transition: filter .15s, transform .1s;
    }
    button:hover { filter: brightness(1.1); }
    button:active { transform: scale(0.96); }
    ul { list-style: none; padding: 0; margin-top: 1.2rem; }
    li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.8rem 1rem; margin-bottom: 0.5rem; border-radius: 10px;
      background: #0b1220; border: 1px solid #293548; transition: background .15s;
    }
    li.done span { text-decoration: line-through; color: var(--muted); }
    li span { cursor: pointer; flex: 1; }
    .del { color: #f87171; background: none; border: none; cursor: pointer;
           font-size: 1.1rem; padding: 0.2rem 0.5rem; }
    .stats { margin-top: 1rem; font-size: 0.9rem; color: var(--muted); }
  </style>
</head>
<body>
  <h1>To-Do Demo</h1>
  <p>Practice <strong>DOM manipulation</strong> and <strong>event handling</strong>: add tasks, toggle completion, and delete them.</p>

  <div class="row">
    <input type="text" id="taskInput" placeholder="What needs to be done?" />
    <button id="addBtn">Add</button>
  </div>

  <ul id="list"></ul>
  <div class="stats" id="stats">0 tasks</div>

  <script>
    const input = document.getElementById("taskInput");
    const addBtn = document.getElementById("addBtn");
    const list = document.getElementById("list");
    const stats = document.getElementById("stats");

    let tasks = []; // array of { id, text, done }

    // Creates one <li> element and wires up its events (DOM + events).
    function renderTask(task) {
      const li = document.createElement("li");
      if (task.done) li.classList.add("done");

      const span = document.createElement("span");
      span.textContent = task.text;
      // Clicking the text toggles the done state.
      span.addEventListener("click", () => {
        task.done = !task.done;
        li.classList.toggle("done", task.done);
        updateStats();
      });

      const del = document.createElement("button");
      del.className = "del";
      del.textContent = "✕";
      del.addEventListener("click", () => {
        tasks = tasks.filter((t) => t.id !== task.id);
        li.remove();
        updateStats();
      });

      li.append(span, del);
      return li;
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) return;
      const task = { id: Date.now(), text, done: false };
      tasks.push(task);
      list.appendChild(renderTask(task));
      input.value = "";
      input.focus();
      updateStats();
    }

    function updateStats() {
      const remaining = tasks.filter((t) => !t.done).length;
      stats.textContent = `${tasks.length} task(s), ${remaining} remaining`;
    }

    // Event handling: button click and Enter key press.
    addBtn.addEventListener("click", addTask);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTask();
    });
  </script>
</body>
</html>
